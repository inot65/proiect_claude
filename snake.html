<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joc Snake - Toni</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            border: 5px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            background-color: #000;
        }
        #score-board {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .game-over-overlay h2 {
            color: #ff4444;
            font-size: 48px;
            margin: 0;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .controls-hint {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="score-board">Scor: 0</div>

    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        <div id="game-over" class="game-over-overlay">
            <h2>GAME OVER</h2>
            <p id="final-score"></p>
            <button onclick="resetGame()">Joacă din nou</button>
        </div>
    </div>

    <div class="controls-hint">Folosește săgețile tastaturii pentru a te deplasa</div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score-board");
        const gameOverScreen = document.getElementById("game-over");
        const finalScoreElement = document.getElementById("final-score");

        const box = 20; // mărimea unui segment
        let score = 0;
        let gameInterval;

        let snake = [];
        snake[0] = { x: 9 * box, y: 10 * box };

        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };

        let d; // direcție

        document.addEventListener("keydown", direction);

        function direction(event) {
            let key = event.keyCode;
            if(key == 37 && d != "RIGHT") {
                d = "LEFT";
            } else if(key == 38 && d != "DOWN") {
                d = "UP";
            } else if(key == 39 && d != "LEFT") {
                d = "RIGHT";
            } else if(key == 40 && d != "UP") {
                d = "DOWN";
            }
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) {
                    return true;
                }
            }
            return false;
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#4CAF50" : "#8BC34A";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#ff4444";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // Verifica dacă a mâncat fructul
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = "Scor: " + score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop();
            }

            let newHead = {
                x: snakeX,
                y: snakeY
            };

            // Game Over logic: perete sau coliziune cu propriul corp
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(gameInterval);
                showGameOver();
                return;
            }

            snake.unshift(newHead);
        }

        function showGameOver() {
            finalScoreElement.innerHTML = "Scorul tău final: " + score;
            gameOverScreen.style.display = "flex";
        }

        function resetGame() {
            score = 0;
            scoreElement.innerHTML = "Scor: 0";
            snake = [];
            snake[0] = { x: 9 * box, y: 10 * box };
            d = null;
            food = {
                x: Math.floor(Math.random() * 19 + 1) * box,
                y: Math.floor(Math.random() * 19 + 1) * box
            };
            gameOverScreen.style.display = "none";
            clearInterval(gameInterval);
            gameInterval = setInterval(draw, 180);
        }

        gameInterval = setInterval(draw, 180);

    </script>
</body>
</html>
